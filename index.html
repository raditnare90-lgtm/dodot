<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laut Kontol</title>
    <link rel="stylesheet" href="style.css">
</head>

    <div class="ocean-bg">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>

                <h1>🌊 Pembayaran Kilat Crot</h1>

            </header>

            <div class="payment-grid">

                <div class="card bank">
                    <div class="icon">🏦</div>

                </div>
