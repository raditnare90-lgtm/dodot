<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oceanic Payment Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="ocean">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="fish">🐠</div>

        <div class="payment-card">
            <div id="main-view">
                <div class="header">
                    <i class="fa-solid fa-water fa-3x"></i>
                    <h1>Oceanic Pay</h1>
                    <p>Masukkan nominal pembayaran</p>
                </div>

                <div class="input-box">
                    <span>Rp</span>
                    <input type="085607762077" id="inputNominal" placeholder="0">
                </div>

                <div class="method-list">
                    <div class="item" onclick="showQRIS()">
                        <div class="icon qris-bg"><i class="fa-solid fa-qrcode"></i></div>
                        <div class="text">
                            <strong>QRIS / E-Wallet</strong>
                            <small>Dana, Gopay, OVO, dll</small>
                        </div>
                    </div>

                    <div class="item" onclick="showBank()">
                        <div class="icon bank-bg"><i class="fa-solid fa-university"></i></div>
                        <div class="text">
                            <strong>Transfer Bank</strong>
                            <small id="bankName">BCA (123-456-789)</small>
                        </div>
                    </div>
                </div>
            </div>

            <div id="qris-view" class="hidden">
                <button class="back-btn" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i> Kembali</button>
                <h2 id="displayTotal">Rp 0</h2>
                
                <div class="qris-frame">
                    <img src="https://ibb.co.com/QvVfvxP0" id="qrisImage">
                    <div class="scanner-line"></div>
                </div>
                
                <p>Silakan scan untuk membayar</p>
                <button class="confirm-btn" onclick="finish()">Selesai Bayar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
